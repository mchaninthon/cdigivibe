<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — C DIGI VIBE</title>
    <!-- Instruct search engine bots not to index this error page but follow the link back home -->
    <meta name="robots" content="noindex, follow">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        limestone: '#EFEEED',
                        ink: '#131407',
                        cobalt: '#2B2E8C',
                    },
                    fontFamily: {
                        nunito: ['"Nunito Sans"', 'sans-serif'],
                        open: ['"Open Sans"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-limestone text-ink font-open min-h-screen flex items-center justify-center relative overflow-hidden px-6">

    <!-- Subtle Structural Grid Line Overlay (Matching your visual canvas identity) -->
    <div class="absolute inset-0 grid grid-cols-4 md:grid-cols-6 pointer-events-none opacity-[0.02]">
        <div class="border-r border-ink h-full"></div>
        <div class="border-r border-ink h-full"></div>
        <div class="border-r border-ink h-full"></div>
        <div class="border-r border-ink h-full"></div>
        <div class="border-r border-ink h-full"></div>
        <div class="border-r border-ink h-full"></div>
    </div>

    <!-- Centered Visual Content Container -->
    <div class="max-w-md w-full text-center relative z-10 space-y-8">
        
        <div class="space-y-3">
            <span class="font-open text-xs uppercase tracking-[0.3em] text-cobalt font-semibold block">Error 404</span>
            <h1 class="font-nunito text-5xl sm:text-6xl font-bold tracking-tight text-ink">
                Page Not Found
            </h1>
        </div>

        <p class="text-sm sm:text-base text-ink/75 leading-relaxed">
            The operational pathway or page you are looking for does not exist or has been shifted. Let's redirect you back to our primary systems.
        </p>

        <div class="pt-4">
            <a href="https://www.cdigivibe.com/" class="inline-block px-8 py-4 bg-cobalt hover:bg-ink text-white font-open font-semibold text-xs uppercase tracking-widest rounded-xl shadow-md transition-all duration-300">
                Return to Home
            </a>
        </div>

    </div>

</body>
</html>
